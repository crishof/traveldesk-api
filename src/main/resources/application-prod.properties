# ============================
# PROD PROFILE ? Railway deploy
# ============================
# En el dashboard de Railway configurar las variables:
#   SPRING_PROFILES_ACTIVE = prod
#   SPRING_DATASOURCE_URL  = jdbc:postgresql://PGHOST:PGPORT/PGDATABASE
#   SPRING_DATASOURCE_USERNAME = PGUSER
#   SPRING_DATASOURCE_PASSWORD = PGPASSWORD
#   BASE64_SECRET_KEY, CORS_ALLOWED_ORIGINS, RESET_PASSWORD_BASE_URL, etc.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres

# DDL: update para despliegues sin Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update

# Logging minimo en prod
spring.jpa.show-sql=false
logging.level.com.crishof=INFO
logging.level.root=WARN

# Actuator
management.endpoint.health.show-details=never

# Swagger deshabilitado en prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS: poner URL de Railway en env var CORS_ALLOWED_ORIGINS
# Ejemplo: https://traveldesk-api-production.up.railway.app,https://tu-frontend.vercel.app
