# ============================
# PROD PROFILE ? Railway deploy
# ============================

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}
spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres

# DDL: update para despliegues sin Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update

# Railway / proxy
server.forward-headers-strategy=framework

# Mail
app.mail.enabled=${MAIL_ENABLED:true}

# Frontend y CORS de prod
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://traveldesk-pi.vercel.app,https://*.vercel.app}
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:https://traveldesk-pi.vercel.app/reset-password}
app.accept-invite.base-url=${ACCEPT_INVITE_BASE_URL:https://traveldesk-pi.vercel.app/accept-invite}

# Logging minimo en prod
spring.jpa.show-sql=false
logging.level.com.crishof=INFO
logging.level.root=WARN

# Actuator
management.endpoint.health.show-details=never

# Swagger deshabilitado en prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
